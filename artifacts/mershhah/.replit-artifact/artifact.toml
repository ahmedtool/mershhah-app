kind = "web"
previewPath = "/"
title = "مرشح | Mershhah"
version = "1.0.0"
id = "artifacts/mershhah"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26045

[services.development]
run = "pnpm --filter @workspace/mershhah run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mershhah", "run", "build" ]
publicDir = "artifacts/mershhah/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26045"
BASE_PATH = "/"
